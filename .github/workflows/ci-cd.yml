name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: store-manager
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_USER: labo05
  DB_PASSWORD: labo05
  DB_NAME: labo05_db
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: 6379
  REDIS_DB: 0
  KAFKA_HOST: labo7-seulement!

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: labo05_db
          MYSQL_USER: labo05
          MYSQL_PASSWORD: labo05
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Initialize database
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot labo05_db < db-init/init.sql

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest src/tests

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply ConfigMaps
        run: |
          kubectl create configmap krakend-config --from-file=krakend.json=./config/krakend.json --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap db-init --from-file=./db-init/ --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}
        run: |
          sed "s#image: nkinesis/store-manager:latest#image: ${IMAGE}#g" k8s-manifests.yml > /tmp/k8s-manifests.yml
          kubectl apply -f /tmp/k8s-manifests.yml
          kubectl rollout status deployment/store-manager
